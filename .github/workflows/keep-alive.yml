# This workflow previously pinged the Streamlit Cloud app during market hours
# to prevent hibernation. Since the migration to Vercel + VPS daemon (Phase 3),
# the frontend no longer runs background processes on Streamlit Cloud.
# All alert checking and Telegram polling now runs on the VPS daemon
# (systemd sentinel-daemon.service), which is always-on and never hibernates.
#
# This file is kept for reference but is disabled. It can be safely deleted
# once the migrate-to-vercel branch is merged to main.
#
# Original purpose: Keep Streamlit Cloud app awake during US market hours
# (cron: '7,37 13-20 * * 1-5'). No longer needed.

name: Keep Alive (DEPRECATED — Streamlit Cloud no longer in use)

# Disabled: uncomment to re-enable during migration rollback
# on:
#   schedule:
#     - cron: '7,37 13-20 * * 1-5'
#   workflow_dispatch:

on:
  workflow_dispatch:  # Manual trigger only, for testing purposes

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: No-op (deprecated)
        run: |
          echo "This workflow is deprecated. Alert checking now runs on the VPS daemon."
          echo "See: .github/workflows/deploy-backend.yml and deploy/sentinel-daemon.service"
