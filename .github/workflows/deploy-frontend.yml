name: Deploy Frontend

on:
  push:
    branches: [main, migrate-to-vercel]
    paths:
      - 'web/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN secret is not set. Skipping Vercel deploy."
            echo "Create a token at https://vercel.com/account/tokens and add it to"
            echo "https://github.com/devjpt23/sentinel/settings/secrets/actions as VERCEL_TOKEN"
            exit 0
          fi
          npx vercel deploy --prod --token="$VERCEL_TOKEN"
        working-directory: ./web
