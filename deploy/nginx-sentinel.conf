# =============================================================================
# Sentinel — nginx Reverse Proxy Configuration
# =============================================================================
# Routes traffic for:
#   - sentinel.app / www.sentinel.app  -> Next.js frontend (localhost:3000)
#   - api.sentinel.app                 -> Flask API (localhost:5252)
#
# SSL via Let's Encrypt / certbot:
#   1. Install certbot: sudo apt install certbot python3-certbot-nginx
#   2. Place this file: sudo cp deploy/nginx-sentinel.conf /etc/nginx/sites-available/sentinel
#   3. Symlink: sudo ln -s /etc/nginx/sites-available/sentinel /etc/nginx/sites-enabled/
#   4. Test config: sudo nginx -t
#   5. Reload: sudo systemctl reload nginx
#   6. Obtain certs: sudo certbot --nginx -d sentinel.app -d www.sentinel.app -d api.sentinel.app
#   7. Auto-renew: certbot timer handles this automatically
# =============================================================================

# --- Rate limiting zones ---
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=web_limit:10m rate=30r/s;

# --- Upstream definitions ---
upstream sentinel_frontend {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream sentinel_api {
    server 127.0.0.1:5252;
    keepalive 64;
}

# =============================================================================
# Frontend: sentinel.app / www.sentinel.app -> Next.js (port 3000)
# =============================================================================
server {
    listen 80;
    server_name sentinel.app www.sentinel.app;

    # Redirect HTTP -> HTTPS (after certbot setup, this is replaced by SSL config)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sentinel.app www.sentinel.app;

    # --- SSL Configuration ---
    # After running certbot, these paths are auto-generated:
    ssl_certificate     /etc/letsencrypt/live/sentinel.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sentinel.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self';" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/opentype
        font/otf
        font/ttf
        application/font-woff
        application/font-woff2;

    # --- Rate limiting ---
    limit_req zone=web_limit burst=50 nodelay;

    # --- Proxy to Next.js ---
    location / {
        proxy_pass http://sentinel_frontend;
        proxy_http_version 1.1;

        # WebSocket support (for future real-time updates)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for SSR pages
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Disable buffering for streaming responses
        proxy_buffering off;
    }

    # --- Static assets (Next.js _next directory) ---
    location /_next/static/ {
        proxy_pass http://sentinel_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # --- Static files in /public ---
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot)$ {
        proxy_pass http://sentinel_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }
}

# =============================================================================
# API: api.sentinel.app -> Flask API (port 5252)
# =============================================================================
server {
    listen 80;
    server_name api.sentinel.app;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.sentinel.app;

    # --- SSL Configuration ---
    ssl_certificate     /etc/letsencrypt/live/api.sentinel.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sentinel.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- Security Headers ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        application/json
        application/xml
        text/css
        text/javascript
        application/javascript;

    # --- Rate limiting (stricter for API) ---
    limit_req zone=api_limit burst=20 nodelay;
    limit_req_status 429;

    # --- CORS preflight: allow OPTIONS without rate limiting ---
    location / {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key, X-Session-Token" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        proxy_pass http://sentinel_api;
        proxy_http_version 1.1;

        # WebSocket support (for future real-time API streams)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # API-specific timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 120s;

        # CORS headers for actual requests
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
    }

    # --- Health check endpoint (no rate limit) ---
    location = /health {
        proxy_pass http://sentinel_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
