# =============================================================================
# Sentinel — nginx Reverse Proxy Configuration
# =============================================================================
# Routes traffic for:
#   - api.sentinel.app                 -> Flask API (localhost:5252)
#
# Frontend (Next.js) is deployed to Vercel — not served through this nginx.
#
# SSL via Let's Encrypt / certbot:
#   1. Install certbot: sudo apt install certbot python3-certbot-nginx
#   2. Place this file: sudo cp deploy/nginx-sentinel.conf /etc/nginx/sites-available/sentinel
#   3. Symlink: sudo ln -s /etc/nginx/sites-available/sentinel /etc/nginx/sites-enabled/
#   4. Test config: sudo nginx -t
#   5. Reload: sudo systemctl reload nginx
#   6. Obtain certs: sudo certbot --nginx -d api.sentinel.app
#   7. Auto-renew: certbot timer handles this automatically
# =============================================================================

# --- Rate limiting zones ---
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# --- Upstream definitions ---
upstream sentinel_api {
    server 127.0.0.1:5252;
    keepalive 64;
}

# =============================================================================
# API: api.sentinel.app -> Flask API (port 5252)
# =============================================================================
server {
    listen 80;
    server_name api.sentinel.app;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.sentinel.app;

    # --- SSL Configuration ---
    ssl_certificate     /etc/letsencrypt/live/api.sentinel.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sentinel.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- Security Headers ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        application/json
        application/xml
        text/css
        text/javascript
        application/javascript;

    # --- Rate limiting (stricter for API) ---
    limit_req zone=api_limit burst=20 nodelay;
    limit_req_status 429;

    # --- CORS preflight: allow OPTIONS without rate limiting ---
    location / {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key, X-Session-Token" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        proxy_pass http://sentinel_api;
        proxy_http_version 1.1;

        # WebSocket support (for future real-time API streams)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # API-specific timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 120s;

        # CORS headers for actual requests
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
    }

    # --- Health check endpoint (no rate limit) ---
    location = /health {
        proxy_pass http://sentinel_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
